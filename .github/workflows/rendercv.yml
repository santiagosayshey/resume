name: Render Resume

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RenderCV
        run: python -m pip install "rendercv[full]"

      - name: Render resume
        run: rendercv render resume.yaml

      - name: Commit generated output
        run: |
          if [[ -z "$(git status --porcelain rendercv_output)" ]]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rendercv_output
          git commit -m "Regenerate resume output"
          git push origin HEAD:main
